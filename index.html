const bin=atob(PAYLOAD), buf=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
const salt=buf.slice(0,16), nonce=buf.slice(16,28), ct=buf.slice(28);
async function unlock(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},key,ct);
  const html=new TextDecoder().decode(pt);
  try{localStorage.setItem("gsm_pw",pw)}catch(e){}
  document.open();document.write(html);document.close();
}
const err=document.getElementById("err"), pw=document.getElementById("pw");
async function attempt(){
  err.textContent="";
  try{await unlock(pw.value)}catch(e){err.textContent="Неверный пароль"}
}
document.getElementById("go").onclick=attempt;
pw.addEventListener("keydown",e=>{if(e.key==="Enter")attempt()});
(async()=>{
  let saved=null; try{saved=localStorage.getItem("gsm_pw")}catch(e){}
  if(saved){document.getElementById("box").innerHTML='<div class="load">Открываю сводку…</div>';
    try{await unlock(saved)}catch(e){location.reload?document.write(document.body.innerHTML):0;
      try{localStorage.removeItem("gsm_pw")}catch(_){ } location.reload();}}
})();
</script>
